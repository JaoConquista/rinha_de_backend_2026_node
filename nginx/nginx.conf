worker_processes 1;
worker_rlimit_nofile 8192;
 
events {
    worker_connections 4096;
    use epoll;
    multi_accept on;
}
 
http {
    access_log  off;
    error_log   /dev/null crit;
 
    sendfile    on;
    tcp_nopush  on;
    tcp_nodelay on;
 
    keepalive_timeout  65;
    keepalive_requests 10000;
 
    # ─── keepalive para o upstream ────────────────────────────────────────────
    # Cada worker do nginx mantém até 32 conexões TCP reutilizáveis com cada
    # instância da API. Sem isso, cada request abre e fecha um socket novo —
    # o custo do 3-way handshake aparece direto no p99.
    upstream api_backend {
        least_conn;
        server api1:3000;
        server api2:3000;
        keepalive 32;          # conexões persistentes por worker
        keepalive_requests 1000;
        keepalive_timeout  60s;
    }
 
    server {
        listen 9999;
 
        location /fraud-score {
            proxy_pass              http://api_backend;
            proxy_http_version      1.1;
            proxy_set_header        Connection "";   # obrigatório para keepalive HTTP/1.1
            proxy_set_header        Host $host;
            proxy_read_timeout      5s;
            proxy_connect_timeout   1s;
        }
 
        location /ready {
            proxy_pass         http://api_backend;
            proxy_http_version 1.1;
            proxy_set_header   Connection "";
        }
    }
}
 