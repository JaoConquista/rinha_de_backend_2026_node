services:
  nginx:
    image: nginx:1.27-alpine
    ports:
      - "9999:9999"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api1
      - api2
    networks:
      - rinha_fraud_net
    deploy:
      resources:
        limits:
          cpus: "0.05"
          memory: "10MB"

  api1:
    build:
      context: .
      dockerfile: api/Dockerfile
    volumes:
      - cache:/app/bin_data
    environment:
      - PORT=3000
      - RESOURCES_DIR=/app/resources
      - CACHE_DIR=/app/bin_data
    networks:
      - rinha_fraud_net
    deploy:
      resources:
        limits:
          cpus: "0.475"
          memory: "170MB"

  api2:
    build:
      context: .
      dockerfile: api/Dockerfile
    volumes:
      - cache:/app/bin_data
    environment:
      - PORT=3000
      - RESOURCES_DIR=/app/resources
      - CACHE_DIR=/app/bin_data
    networks:
      - rinha_fraud_net
    deploy:
      resources:
        limits:
          cpus: "0.475"
          memory: "170MB"

volumes:
  cache:
    driver: local

networks:
  rinha_fraud_net:
    driver: bridge
