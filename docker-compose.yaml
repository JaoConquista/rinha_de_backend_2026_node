services:
  preprocessor:
    build:
      context: ./api/preprocessor
      dockerfile: Dockerfile
    volumes:
      - ./resources:/app/resources:ro
      - ./cache:/app/cache:ro
    environment:
      - RESOURCES_DIR=/app/resources
      - CACHE_DIR=/app/cache
    deploy:
      resources:
        limits:
          cpus: "0.05"
          memory: "20MB"

  nginx:
    image: nginx:1.27-alpine
    ports:
      - "9999:9999"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api1
      - api2
    networks:
      - rinha_fraud_net
    deploy:
      resources:
        limits:
          cpus: "0.05"
          memory: "10MB"

  api1:
    build:
      context: ./api
      dockerfile: Dockerfile
    volumes:
      - ./resources:/app/resources:ro
      - ./cache:/app/cache:ro
    environment:
      - PORT=3000
      - RESOURCES_DIR=/app/resources
      - CACHE_DIR=/app/cache
    depends_on:
      preprocessor:
        condition: service_completed_successfully
    networks:
      - rinha_fraud_net
    deploy:
      resources:
        limits:
          cpus: "0.475"
          memory: "160MB"
  
  api2:
    build:
      context: ./api
      dockerfile: Dockerfile
    volumes:
      - ./resources:/app/resources:ro
      - ./cache:/app/cache:ro
    environment:
      - PORT=3000
      - RESOURCES_DIR=/app/resources
      - CACHE_DIR=/app/cache
    depends_on:
      preprocessor:
        condition: service_completed_successfully
    networks:
      - rinha_fraud_net
    deploy:
      resources:
        limits:
          cpus: "0.475"
          memory: "160MB"

volumes:
  cache:
    driver: local

networks:
  rinha_fraud_net:
    driver: bridge